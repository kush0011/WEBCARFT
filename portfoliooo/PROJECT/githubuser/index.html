<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub User Finder</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <div class="wrapper">
        <h1 class="title">GitHub <span>User Finder</span></h1>
        <p class="subtitle">Search any GitHub username to see their profile</p>

        <div class="search-row">
            <input class="inp" type="text" placeholder="e.g. kush0011, torvalds..." />
            <button class="searchBtn" onclick="searchUser()">Search</button>
        </div>

        <div class="cards"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
